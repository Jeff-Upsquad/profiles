server {
    listen 80;
    server_name _;  # Replace with your domain when ready

    client_max_body_size 500M;  # Allow large file uploads

    # Frontend (user app)
    location / {
        root /var/www/profiles/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Admin app
    location /admin {
        alias /var/www/profiles/admin/dist;
        try_files $uri $uri/ /admin/index.html;
    }

    # API proxy
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Serve uploaded files
    location /uploads {
        alias /var/www/profiles/backend/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
